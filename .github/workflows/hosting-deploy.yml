name: Hosting Deploy

# Hosting-only: deploy Render + Vercel without waiting for CI.
# Requires repo/environment secrets: RENDER_API_KEY, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

on:
  workflow_dispatch:
    inputs:
      component:
        description: What to deploy
        type: choice
        options:
          - all
          - backend
          - frontend
        default: all

concurrency:
  group: hosting-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy hosting (Render + Vercel)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
          RENDER_BRANCH: main
          FRONTEND_URL: ${{ vars.APP_URL }}
          REQUIRE_DEPLOY: "true"
          DEPLOY_LOG_FILE: deploy.log
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/ci/deploy.sh production ${{ inputs.component }}

      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosting-deploy-log
          path: |
            deploy.log
            render-deploy.log
            vercel-deploy-url.txt
          if-no-files-found: ignore
