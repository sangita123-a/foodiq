name: Reusable CI

on:
  workflow_call:
    inputs:
      run_ui_smoke:
        description: Run frontend HTML smoke against FRONTEND_URL
        type: boolean
        default: false
      run_api_smoke:
        description: Start API with Postgres and run API smoke
        type: boolean
        default: true
      upload_artifacts:
        type: boolean
        default: true
      environment_label:
        type: string
        default: ci
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
      TEAMS_WEBHOOK_URL:
        required: false
      NOTIFY_EMAIL_WEBHOOK:
        required: false

jobs:
  frontend:
    name: Frontend — lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit (frontend)
        continue-on-error: true
        run: npm audit --audit-level=critical

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:4000}"
          npm run build

      - name: Upload frontend build artifact
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-${{ inputs.environment_label }}
          path: |
            .next
            public
            package.json
            package-lock.json
            next.config.ts
          retention-days: 14

  backend:
    name: Backend — test, migrate, API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foodiq
          POSTGRES_PASSWORD: foodiq
          POSTGRES_DB: foodiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foodiq -d foodiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: foodiq-frontend/foodiq-backend
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: foodiq
      DB_PASSWORD: foodiq
      DB_NAME: foodiq
      JWT_SECRET: ci-jwt-secret-not-for-production
      FRONTEND_URL: http://localhost:3000
      RAZORPAY_MOCK: "true"
      FCM_MOCK: "true"
      EMAIL_PROVIDER: mock
      SMS_PROVIDER: mock
      STORAGE_PROVIDER: mock
      REDIS_ENABLED: "false"
      PORT: "4000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: foodiq-frontend/foodiq-backend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit (backend)
        continue-on-error: true
        run: npm audit --audit-level=critical

      - name: Bootstrap schema.sql (baseline)
        run: |
          PGPASSWORD=foodiq psql -h localhost -U foodiq -d foodiq -f database/schema.sql

      - name: Run migrations (ensureSchema)
        run: npm run db:migrate

      - name: Verify schema
        run: npm run db:verify

      - name: Start API
        if: inputs.run_api_smoke
        run: |
          nohup node server.js > /tmp/foodiq-api.log 2>&1 &
          echo $! > /tmp/foodiq-api.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4000/api/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; cat /tmp/foodiq-api.log; exit 1

      - name: API smoke tests
        if: inputs.run_api_smoke
        run: npm run test:api

      - name: Module validation
        if: inputs.run_api_smoke
        run: npm run test:modules

      - name: Upload backend package artifact
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-src-${{ inputs.environment_label }}
          path: |
            foodiq-frontend/foodiq-backend/**
            !foodiq-frontend/foodiq-backend/node_modules/**
            !foodiq-frontend/foodiq-backend/logs/**
            !foodiq-frontend/foodiq-backend/uploads/**
            !foodiq-frontend/foodiq-backend/foodiq-frontend/**
          retention-days: 14

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  ui-smoke:
    name: UI smoke
    if: inputs.run_ui_smoke
    needs: [frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Start Next.js
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
        run: |
          npm run build
          nohup npm run start -- -p 3000 > /tmp/next.log 2>&1 &
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:3000 >/dev/null; then echo ready; exit 0; fi
            sleep 2
          done
          cat /tmp/next.log; exit 1
      - name: UI smoke routes
        env:
          FRONTEND_URL: http://127.0.0.1:3000
        run: npm run test:ui

  notify:
    name: Notify CI result
    needs: [frontend, backend, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          NOTIFY_EMAIL_WEBHOOK: ${{ secrets.NOTIFY_EMAIL_WEBHOOK }}
          STATUS: ${{ needs.frontend.result == 'success' && needs.backend.result == 'success' && 'success' || 'failure' }}
          TITLE: "Foodiq CI (${{ inputs.environment_label }})"
          DETAILS: "frontend=${{ needs.frontend.result }} backend=${{ needs.backend.result }} security=${{ needs.security.result }}"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/ci/notify.sh

      - name: Fail workflow if CI jobs failed
        if: needs.frontend.result != 'success' || needs.backend.result != 'success'
        run: |
          echo "CI failed: frontend=${{ needs.frontend.result }} backend=${{ needs.backend.result }}"
          exit 1
