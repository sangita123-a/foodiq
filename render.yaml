# Foodiq API + PostgreSQL on Render
# Dashboard → New → Blueprint → select this repo (or sync existing Blueprint)

databases:
  - name: foodiq-db
    databaseName: foodiq
    user: foodiq
    plan: basic-256mb
    region: singapore

services:
  - type: web
    name: foodiq-backend-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: foodiq-frontend/foodiq-backend
    buildCommand: npm ci --omit=dev
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: CORS_STRICT
        value: "true"
      - key: CORS_ALLOW_VERCEL
        value: "false"
      - key: AUTH_SECURE_COOKIES
        value: "true"
      - key: CSRF_ENABLED
        value: "true"
      - key: ALLOW_BOOTSTRAP_USERS
        value: "false"
      - key: ALLOW_PAYMENT_MOCK
        value: "false"
      - key: RAZORPAY_MOCK
        value: "false"
      - key: FRONTEND_URL
        value: https://foodiq-sangita123-as-projects.vercel.app
      - key: CORS_ORIGINS
        value: https://foodiq-sangita123-as-projects.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: foodiq-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "15000"
      # Set real keys in Render dashboard — do not use mock in production
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_PROVIDER
        value: mock
      - key: SMS_PROVIDER
        value: mock
      - key: OTP_EXPOSE_CODE
        value: "false"
      - key: FCM_MOCK
        value: "true"
      - key: STORAGE_PROVIDER
        value: auto
      # Redis: set true + REDIS_URL with add-on (see docs/V3_CDN_REDIS.md)
      - key: REDIS_ENABLED
        value: "false"
      - key: SEARCH_PROVIDER
        value: "pg"
      - key: PRICING_ENGINE_ENABLED
        value: "false"
      - key: TAX_ENGINE_ENABLED
        value: "false"
      - key: MULTI_CURRENCY_PAYMENTS
        value: "false"
      - key: SSO_ENABLED
        value: "false"
      - key: AI_ASSISTANTS_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: info
